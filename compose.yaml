services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgd}
      POSTGRES_USER: ${POSTGRES_USER:-sgd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sgd}
      DB_USER: ${POSTGRES_USER:-sgd}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no arquivo .env}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:5173}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: ${MAIL_FROM:-nao-responda@sgd.local}
      MAIL_TLS: "false"
      PASSWORD_RESET_MINUTES: ${PASSWORD_RESET_MINUTES:-30}
      PASSWORD_SETUP_HOURS: ${PASSWORD_SETUP_HOURS:-24}
    # Bind only to localhost so X-Forwarded-For cannot be spoofed via public :8080.
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
