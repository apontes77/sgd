spring:
  application:
    name: sgd-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sgd}
    username: ${DB_USER:sgd}
    password: ${DB_PASSWORD:sgd}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db

app:
  password-reset:
    frontend-url: ${PASSWORD_RESET_FRONTEND_URL:}
  mail:
    from: ${MAIL_FROM:}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  security:
    jwt-secret: ${JWT_SECRET:desenvolvimento-apenas-troque-por-um-segredo-com-32-bytes}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
    password-reset-minutes: ${PASSWORD_RESET_MINUTES:60}
    admin-email: ${ADMIN_INITIAL_EMAIL:}
    admin-password: ${ADMIN_INITIAL_PASSWORD:}
