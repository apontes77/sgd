spring:
  application:
    name: sgd-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sgd}
    username: ${DB_USER:sgd}
    password: ${DB_PASSWORD:sgd}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:false}
          starttls:
            enable: ${MAIL_TLS:false}

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

app:
  mail:
    public-url: ${APP_PUBLIC_URL:http://localhost:5173}
    from: ${MAIL_FROM:nao-responda@sgd.local}
    tls: ${MAIL_TLS:false}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  security:
    jwt-secret: ${JWT_SECRET:desenvolvimento-apenas-troque-por-um-segredo-com-32-bytes}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
    password-reset-minutes: ${PASSWORD_RESET_MINUTES:30}
    password-setup-hours: ${PASSWORD_SETUP_HOURS:24}
    admin-email: ${ADMIN_INITIAL_EMAIL:}
