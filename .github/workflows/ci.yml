name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn clean verify
      - name: Build production image
        run: docker build --tag sgd-api:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run lint
      - run: pnpm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sgd
          POSTGRES_USER: sgd
          POSTGRES_PASSWORD: sgd-e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sgd -d sgd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ADMIN_INITIAL_EMAIL: admin-e2e@example.com
      ADMIN_INITIAL_PASSWORD: admin-e2e-senha-segura
      E2E_ADMIN_EMAIL: admin-e2e@example.com
      E2E_ADMIN_PASSWORD: admin-e2e-senha-segura
      JWT_SECRET: e2e-jwt-secret-com-pelo-menos-32-chars
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: sgd
      DB_USER: sgd
      DB_PASSWORD: sgd-e2e
      SPRING_PROFILES_ACTIVE: local
      PASSWORD_RESET_FRONTEND_URL: http://127.0.0.1:5173
      MAIL_FROM: sgd-e2e@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Start API
        working-directory: backend
        run: |
          nohup mvn -q spring-boot:run > ../api-e2e.log 2>&1 &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8080/api/health >/dev/null; then
              echo "API pronta"
              exit 0
            fi
            sleep 2
          done
          echo "API não respondeu a tempo" >&2
          tail -n 200 ../api-e2e.log || true
          exit 1
      - name: Verify admin bootstrap login
        run: |
          curl -sf -X POST http://127.0.0.1:8080/api/v1/autenticacao/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"${ADMIN_INITIAL_EMAIL}\",\"senha\":\"${ADMIN_INITIAL_PASSWORD}\"}" \
            | tee /tmp/login-e2e.json \
            | grep -q accessToken
          echo "Login direto na API OK"
      - name: Install frontend and Playwright
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install chromium --with-deps
      - name: Run Playwright
        working-directory: frontend
        run: pnpm run test:e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
            api-e2e.log
          if-no-files-found: ignore

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Render Blueprint YAML
        run: |
          ruby -e "require 'yaml'; spec = YAML.safe_load(File.read('render.yaml'), aliases: true); abort 'missing Render services' unless spec.fetch('services').map { |service| service.fetch('name') }.sort == %w[sgd-api sgd-web]; abort 'missing Render database' unless spec.fetch('databases').map { |database| database.fetch('name') } == %w[sgd-db]"
