name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn clean verify
      - name: Build production image
        run: docker build --tag sgd-api:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm run build

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Render Blueprint YAML
        run: |
          ruby -e "require 'yaml'; spec = YAML.safe_load(File.read('render.yaml'), aliases: true); abort 'missing Render services' unless spec.fetch('services').map { |service| service.fetch('name') }.sort == %w[sgd-api sgd-web]; abort 'missing Render database' unless spec.fetch('databases').map { |database| database.fetch('name') } == %w[sgd-db]"
