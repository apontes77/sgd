services:
  - type: web
    runtime: static
    name: sgd-web
    rootDir: frontend
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: ./dist
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: VITE_API_ORIGIN
        fromService:
          type: web
          name: sgd-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: docker
    name: sgd-api
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: virginia
    plan: starter
    numInstances: 1
    autoDeployTrigger: checksPass
    healthCheckPath: /actuator/health/readiness
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sgd-db
          property: connectionString
      - key: DB_NAME
        fromDatabase:
          name: sgd-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sgd-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sgd-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_INITIAL_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: PASSWORD_RESET_FRONTEND_URL
        fromService:
          type: web
          name: sgd-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: MAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTH
        value: "true"
      - key: SMTP_STARTTLS
        value: "true"
      - key: CORS_ALLOWED_ORIGIN
        fromService:
          type: web
          name: sgd-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DEPLOYMENT_ENVIRONMENT
        value: production
      - key: OTEL_SERVICE_NAME
        value: sgd-api
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      - key: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      - key: OTEL_EXPORTER_OTLP_COMPRESSION
        value: gzip
      - key: OTEL_TRACES_EXPORTER
        value: none
      - key: OTEL_METRICS_EXPORTER
        value: none
      - key: OTEL_LOGS_EXPORTER
        value: none
      - key: OTEL_TRACES_SAMPLER
        value: parentbased_traceidratio
      - key: OTEL_TRACES_SAMPLER_ARG
        value: "1.0"
      - key: OTEL_PROPAGATORS
        value: tracecontext,baggage

databases:
  - name: sgd-db
    region: virginia
    plan: free
    postgresMajorVersion: "16"
    databaseName: sgd
    user: sgd
    connectionPool: none
    ipAllowList: []
